<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="./manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Organic Oasis Wayfinding Kiosk</title>
    <link rel="stylesheet" href="styles.css?v=v2">
</head>
<body>
    <div class="kiosk-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar wood-texture">
            <header>
                <h1>Fox Valley Center</h1>
                <p>Directory & Wayfinding</p>
            </header>

            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Search for stores, dining...">
                <button id="searchBtn" aria-label="Search">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </button>
            </div>

            <div class="categories">
                <button class="cat-btn active" data-cat="all">All</button>
                <button class="cat-btn" data-cat="apparel">Apparel</button>
                <button class="cat-btn" data-cat="jewelry">Jewelry</button>
                <button class="cat-btn" data-cat="dining">Dining</button>
            </div>

            <div class="store-list" id="storeList">
                <!-- Store items will be populated here by JavaScript -->
            </div>

            <div class="store-details hidden" id="storeDetails">
                <button id="backBtn" class="back-btn">← Back to Directory</button>
                <div class="store-info-card">
                    <h2 id="detailName">Store Name</h2>
                    <p id="detailCategory" class="category-badge">Category</p>
                    <p id="detailDesc" class="store-desc">Store description goes here.</p>
                </div>
                <div class="action-buttons">
                    <button id="routeBtn" class="primary-btn">Guide Me There</button>
                </div>
            </div>
        </aside>

        <!-- Main Map Area -->
        <main class="map-container">
            <div class="map-wrapper" id="mapWrapper">
                <!-- The Map SVG -->
                <svg id="mallMap" viewBox="0 0 1000 800" preserveAspectRatio="xMidYMid meet">
                    <!-- Base Floor (Cream/Beige) -->
                    <rect x="50" y="50" width="900" height="700" rx="40" fill="#E8E4D9" stroke="#D1C7B1" stroke-width="4"/>

                    <!-- Corridors (Lighter path) -->
                    <path d="M 150 150 L 850 150 L 850 650 L 150 650 Z" fill="#F5F2EB" />

                    <!-- Central Organic Oasis Area -->
                    <!-- Green Turf -->
                    <path d="M 300 300 Q 500 200 700 300 Q 800 500 700 600 Q 500 700 300 600 Q 200 400 300 300 Z" fill="#7CB342" opacity="0.8"/>

                    <!-- Water Feature / Fountain -->
                    <circle cx="500" cy="450" r="60" fill="#4FC3F7" stroke="#0288D1" stroke-width="3"/>
                    <circle cx="500" cy="450" r="45" fill="#29B6F6" opacity="0.6"/>
                    <circle cx="500" cy="450" r="20" fill="#E1F5FE" />

                    <!-- Abstract Wooden Tree Structures -->
                    <circle cx="380" cy="350" r="35" fill="#8D6E63" />
                    <circle cx="380" cy="350" r="25" fill="#6D4C41" />

                    <circle cx="620" cy="350" r="45" fill="#8D6E63" />
                    <circle cx="620" cy="350" r="30" fill="#6D4C41" />

                    <circle cx="650" cy="550" r="30" fill="#8D6E63" />
                    <circle cx="650" cy="550" r="20" fill="#6D4C41" />

                    <!-- Red Fox Sculpture -->
                    <g transform="translate(350, 520) scale(1.5)">
                        <polygon points="0,20 15,0 30,20 25,30 5,30" fill="#D32F2F" />
                        <polygon points="15,0 30,20 45,10" fill="#F44336" />
                        <polygon points="45,10 30,20 50,30" fill="#B71C1C" />
                    </g>

                    <!-- Store Blocks -->
                    <!-- Top Row -->
                    <g class="store" id="store-1" data-id="1">
                        <rect x="150" y="50" width="150" height="100" fill="#FFFFFF" stroke="#D1C7B1" stroke-width="2" rx="10"/>
                        <text x="225" y="105" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#5D4037">Vans</text>
                    </g>
                    <g class="store" id="store-2" data-id="2">
                        <rect x="300" y="50" width="200" height="100" fill="#FFFFFF" stroke="#D1C7B1" stroke-width="2" rx="10"/>
                        <text x="400" y="105" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#5D4037">Sunglass Hut</text>
                    </g>
                    <g class="store" id="store-3" data-id="3">
                        <rect x="500" y="50" width="200" height="100" fill="#FFFFFF" stroke="#D1C7B1" stroke-width="2" rx="10"/>
                        <text x="600" y="105" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#5D4037">Francesca's</text>
                    </g>
                    <g class="store" id="store-4" data-id="4">
                        <rect x="700" y="50" width="150" height="100" fill="#FFFFFF" stroke="#D1C7B1" stroke-width="2" rx="10"/>
                        <text x="775" y="105" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#5D4037">Food Court</text>
                    </g>

                    <!-- Bottom Row -->
                    <g class="store" id="store-5" data-id="5">
                        <rect x="150" y="650" width="250" height="100" fill="#FFFFFF" stroke="#D1C7B1" stroke-width="2" rx="10"/>
                        <text x="275" y="705" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#5D4037">Helzberg Diamonds</text>
                    </g>
                    <g class="store" id="store-6" data-id="6">
                        <rect x="400" y="650" width="150" height="100" fill="#FFFFFF" stroke="#D1C7B1" stroke-width="2" rx="10"/>
                        <text x="475" y="705" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#5D4037">Brighton</text>
                    </g>
                    <g class="store" id="store-7" data-id="7">
                        <rect x="550" y="650" width="300" height="100" fill="#FFFFFF" stroke="#D1C7B1" stroke-width="2" rx="10"/>
                        <text x="700" y="705" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#5D4037">Imagination Playground</text>
                    </g>

                    <!-- Side Rows -->
                    <g class="store" id="store-8" data-id="8">
                        <rect x="50" y="150" width="100" height="250" fill="#FFFFFF" stroke="#D1C7B1" stroke-width="2" rx="10"/>
                        <text x="100" y="275" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#5D4037" transform="rotate(-90 100,275)">Wood Art</text>
                    </g>
                    <g class="store" id="store-9" data-id="9">
                        <rect x="850" y="400" width="100" height="250" fill="#FFFFFF" stroke="#D1C7B1" stroke-width="2" rx="10"/>
                        <text x="900" y="525" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#5D4037" transform="rotate(90 900,525)">Restrooms</text>
                    </g>

                    <!-- Path Layer (dynamically drawn) -->
                    <g id="pathLayer"></g>

                    <!-- You Are Here Marker -->
                    <g id="youAreHereMarker" transform="translate(500, 600)">
                        <!-- Outer pulsing ring -->
                        <circle cx="0" cy="0" r="25" fill="rgba(139, 90, 43, 0.2)">
                            <animate attributeName="r" values="25; 40; 25" dur="2s" repeatCount="indefinite" />
                            <animate attributeName="opacity" values="1; 0; 1" dur="2s" repeatCount="indefinite" />
                        </circle>
                        <!-- Main marker -->
                        <circle cx="0" cy="0" r="12" fill="#8B5A2B" stroke="#FFF" stroke-width="3"/>
                        <circle cx="0" cy="0" r="5" fill="#FFF"/>
                        <!-- Label -->
                        <rect x="-60" y="-45" width="120" height="30" rx="15" fill="#8B5A2B" opacity="0.9"/>
                        <text x="0" y="-25" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#FFF">You Are Here</text>
                    </g>
                </svg>
            </div>

            <!-- Floating Map Controls -->
            <div class="map-controls">
                <button id="zoomIn" aria-label="Zoom In">+</button>
                <button id="zoomOut" aria-label="Zoom Out">-</button>
                <button id="resetMap" aria-label="Reset View">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                        <polyline points="9 22 9 12 15 12 15 22"></polyline>
                    </svg>
                </button>
            </div>
        </main>
    </div>

    <script src="script.js?v=v2"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('./sw.js')
          .then(function (reg) { console.log('[PWA] SW registered:', reg.scope); })
          .catch(function (err) { console.warn('[PWA] SW registration failed:', err); });
      });
    }
  </script>
</body>
</html>
